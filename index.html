<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/appiconf.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuickFind</title>

    <script>
      (function () {
        try {
          var savedTheme = localStorage.getItem('theme');
          var systemDark = window.matchMedia(
            '(prefers-color-scheme: dark)',
          ).matches;

          var isDark =
            savedTheme === 'dark' ||
            (!savedTheme && systemDark) ||
            (savedTheme === 'system' && systemDark);

          if (isDark) {
            document.documentElement.classList.add('dark');
            // Solo aplicamos al HTML (documentElement), el body aún no existe aquí
            document.documentElement.style.backgroundColor = '#161d26';
          } else {
            document.documentElement.classList.remove('dark');
            document.documentElement.style.backgroundColor = '#ffffff';
          }
        } catch (e) {
          console.error('Error setting initial theme', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
